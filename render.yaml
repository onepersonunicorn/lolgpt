services:
  - type: web
    name: lolgpt-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: LOL_API_URL
        value: https://1tier.xyz
